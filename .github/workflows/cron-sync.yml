name: Scheduled Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync endpoint
        env:
          CRON_SYNC_URL: ${{ secrets.CRON_SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SYNC_URL" ]; then
            echo "CRON_SYNC_URL secret is missing"
            exit 1
          fi

          auth_args=()
          if [ -n "$CRON_SECRET" ]; then
            auth_args=(-H "Authorization: Bearer $CRON_SECRET")
          fi

          curl --fail --show-error --silent \
            -X POST \
            "${auth_args[@]}" \
            "$CRON_SYNC_URL"
